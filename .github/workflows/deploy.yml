name: Deploy Backend to GCP

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/deploy-cloudfunctions@v1
        with:
          name: handle-waiter-interaction
          runtime: python312
          entry_point: waiter_handler
          source_dir: backend/
