<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny Kelner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-900 text-gray-200 font-sans flex flex-col h-screen">
    <header class="bg-zinc-950 p-4 border-b border-yellow-600 flex justify-center items-center shadow-md">
        <h1 class="text-yellow-500 text-2xl font-serif italic tracking-wider">Wirtualny Kelner</h1>
    </header>
    
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
        <div class="flex justify-start">
            <div class="message-bot rounded-lg p-3 max-w-[80%] shadow-md">
                <p>Buonasera! Witamy w naszej restauracji. W czym mogę dzisiaj pomóc?</p>
            </div>
        </div>
    </main>

    <footer class="bg-zinc-950 p-4 border-t border-yellow-600 shadow-lg fixed bottom-0 w-full">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="user-input" class="flex-1 bg-zinc-800 text-white rounded-md px-4 py-3 focus:outline-none focus:ring-1 focus:ring-yellow-500 border border-zinc-700 transition-colors" placeholder="Wpisz wiadomość..." required autocomplete="off">
            <button type="submit" class="bg-yellow-600 hover:bg-yellow-500 text-zinc-950 font-semibold px-6 py-3 rounded-md transition-colors shadow-sm">
                Wyślij
            </button>
        </form>
    </footer>

    <script src="app.js"></script>
</body>
</html>
